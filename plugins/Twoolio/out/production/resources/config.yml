debug:
  unbreakableBlocks: false # Set to true to disable block breaking
  printEXPGainValue: false # Set to true to see amount of points gained per event

toolConfig:
  setUnbreakable: true

expConfig:
  tools:
    expPerLevel:
      1: 100
      2: 150
      3: 200
      4: 250
      5: 300
      6: 400
      7: 550
      8: 750
      9: 900
      10: 1100
      11: 1300
      12: 1500
      13: 1700
      14: 2000
    expCapPerGain: 25
    expBlockBreakGainScalar: 1.5
  armor:
    expPerLevel:
      1: 10
      2: 20
      3: 30
  sword:
    expCapPerGain: 50
    expDamageDealGainScalar: 2.5
    allowEXPGainOnBlockBreak: false

toolLevelUpEffects:
  effect: OXIDISED_COPPER_SCRAPE
  sound: ENTITY_PLAYER_LEVELUP
  volume: 1
  pitch: 2

# Pairs as {enchantment : max level to offer}
# DO NOT alter type string (PICKAXES, SHOVELS, etc.)
toolEnchantments:
  PICKAXES:
    efficiency  : { "maxlvl": 6, "cost": 1 }
    fortune     : { "maxlvl": 3, "cost": 2 }
    silk_touch  : { "maxlvl": 1, "cost": 3 }
  SHOVELS:
    efficiency  : { "maxlvl": 5, "cost": 1 }
    fortune     : { "maxlvl": 3, "cost": 2 }
    silk_touch  : { "maxlvl": 1, "cost": 2 }
  AXES:
    efficiency  : { "maxlvl": 8, "cost": 1 }
    fortune     : { "maxlvl": 3, "cost": 2 }
    sharpness   : { "maxlvl": 5, "cost": 1 }
    smite       : { "maxlvl": 5, "cost": 1 }
  SWORDS:
    fortune     : { "maxlvl": 3, "cost": 2 }
    sharpness   : { "maxlvl": 5, "cost": 1 }
    smite       : { "maxlvl": 5, "cost": 1 }
    fire_aspect : { "maxlvl": 2, "cost": 2 }
    looting     : { "maxlvl": 3, "cost": 2 }
    knockback   : { "maxlvl": 2, "cost": 1 }
    sweeping    : { "maxlvl": 3, "cost": 1 }
  HOES:
    efficiency  : { "maxlvl": 5, "cost": 1 }

loreStrings:
  level: "Level: "
  upgrades: "Upgrades: "
  exp: "XP: "
  cost: "Cost: "

